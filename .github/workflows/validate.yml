name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate fee JSON is well-formed and complete
        run: python3 tests/validate.py
      - name: Calculator smoke test
        run: |
          python3 calculator.py --exchange binance --market futures --volume 10000000 --maker-share 0.7 --rebate 0.4
          python3 calculator.py --exchange okx --market futures --volume 50000000 --maker-share 0.9 --rebate 0.4
